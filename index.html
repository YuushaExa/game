<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta property="og:title" content="Exa App Engine" id="og-title">
    <meta property="og:description" content="App Engine" id="og-description">
    <meta property="og:image" content="" id="og-image">
  <title>Exa App Engine</title>
  <style>
    #game {
      width: 100%;
      height: 90vh;
      position: relative;
    }

    #error-message {
      color: red;
      font-family: Arial, sans-serif;
      text-align: center;
      margin-top: 20px;
      display: none;
    }

    .background-image {
      width: 100%;
      height: 100%;
      position: absolute;
      top: 0;
      left: 0;
      background-size: cover;
    }

    .text-panel {
      width: 95%;
      height: 25%;
      background-color: #9cf;
      position: absolute;
      bottom: 32px;
      font-size: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      color: #000;
    }

    .choices-container {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 10px;
    }

    .menu-button {
      padding: 10px 20px;
      font-size: 20px;
      cursor: pointer;
      background-color: #4CAF50;
      color: black;
      border: none;
      border-radius: 5px;
      transition: background-color 0.3s ease;
    }

    .menu-button:hover {
      background-color: #45a049;
    }

    .character-name {
      font-weight: bold;
    }
    </style>
</head>
<body>
<div id="game">
        <!-- Start Screen -->
        <div id="start-screen" class="screen">
            <button id="start-button" class="menu-button">Start</button>
            <button id="load-button" class="menu-button">Load</button>
            <button id="settings-button" class="menu-button">Settings</button>
        </div>

        <!-- Text Panel -->
        <div id="text-panel" class="panel"></div>
    </div>
<div id="error-message" style="display: none;">Failed to load the game engine. Please contact the app owner.</div>
<script id="gameData" data-src="episode.json"></script>
<script type="text/javascript" src="exa.js" onerror="handleScriptError()"></script>
<script>
  function handleScriptError() {
    const errorMessage = document.getElementById('error-message');
    errorMessage.style.display = 'block'; 
    console.error('Failed to load exa.js'); 
  }
</script>
</body>
</html>
