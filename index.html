<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exa Engine</title>
  <style>
    #game {  
      width: 100%; 
      height: 90vh;
    }
    #error-message {
      color: red;
      font-family: Arial, sans-serif;
      text-align: center;
      margin-top: 20px;
      display: none; 
    }
  </style>
</head>
<body onload="data('episode.json')">
  <div id="game"></div>
  <div id="error-message">Failed to load the game engine. Please contant app owner. </div>
  <script type="text/javascript" src="exa.js" onerror="handleScriptError()"></script>
  <script>
    function handleScriptError() {
      const errorMessage = document.getElementById('error-message');
      errorMessage.style.display = 'block'; 
      console.error('Failed to load exa.js'); 
    }
  </script>
</body>
</html>
