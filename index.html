<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visual Novel Episodes</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 20px;
        }
        h1 {
            text-align: center;
        }
        .episode-list {
            list-style-type: none;
            padding: 0;
        }
        .episode-list li {
            margin: 10px 0;
        }
        .episode-list a {
            text-decoration: none;
            color: #007BFF;
        }
        #episodeContent {
            margin-top: 20px;
            padding: 10px;
            background-color: #fff;
            border: 1px solid #ccc;
        }
        button.choice-button {
    color: darkred;
        }
        button.next-button {
    color: green;
}
    </style>
</head>
            <script src="userScripts.js" defer></script>
<body>
    <h1>Visual Novel Episodes</h1>
    <ul class="episode-list" id="episodeList">
        <li><a href="#" data-episode-file="episode1.json">Episode 1: The Beginning</a></li>
        <li><a href="#" data-episode-file="episode2.json">Episode 2: The Journey Continues</a></li>
        <!-- Add more episodes here -->
    </ul>
        <div id="episodeContent"></div> <!-- Added this line -->

    <script>
           let currentSceneId = null; 
        let currentEpisode = null; 

        document.getElementById('episodeList').addEventListener('click', (event) => {
            if (event.target.tagName === 'A') {
                event.preventDefault(); // Prevent default anchor behavior
                const episodeFile = event.target.getAttribute('data-episode-file');
                loadEpisode(episodeFile);
            }
        });

        function loadEpisode(file) {
            fetch(file)
                .then(response => {
                    if (!response.ok) {
                        throw new Error('Network response was not ok');
                    }
                    return response.json();
                })
                .then(data => {
                    currentEpisode = data; 
                    currentSceneId = currentEpisode.scenes[0].id; 
                    displayScene(currentEpisode, currentSceneId); 
                })
                .catch(error => {
                    console.error('There was a problem with the fetch operation:', error);
                    document.getElementById('episodeContent').innerText = 'Failed to load episode. Please try again later.';
                });
        }

function displayScene(episode, sceneId) {
    const episodeContent = document.getElementById('episodeContent');
    const scene = episode.scenes.find(s => s.id === sceneId);

    if (!scene) {
        episodeContent.innerHTML = '<p>Scene not found.</p>';
        return; // Exit if the scene is not found
    }

    // Access the title from the episode object
    const title = episode.title; // Get the title from the episode
    const { text, choices, nextScene, nextEpisode } = scene;

    let content = `
        ${generateSceneHeader(title)}
        ${generateSceneText(text)}
    `;

    if (choices && choices.length > 0) {
        content += generateChoices(choices);
    } else if (nextScene) {
        content += generateNextButton(nextScene);
    }

    if (nextEpisode) {
        content += generateNextEpisodeButton(nextEpisode);
    }

    // Update the DOM in a single operation
    episodeContent.innerHTML = content;
}


function generateSceneHeader(title) {
    return `<h2>${title}</h2>`;
}

function generateSceneText(text) {
    return `<p>${text}</p>`;
}

function generateChoices(choices) {
    return choices.map(choice => 
        `<button class="choice-button" data-next-scene="${choice.nextScene}" aria-label="${choice.text}">${choice.text}</button>`
    ).join('');
}

function generateNextButton(nextScene) {
    return `<button class="next-button" data-next-scene="${nextScene}" aria-label="Next scene">Next</button>`;
}

function generateNextEpisodeButton(nextEpisode) {
    return `<button class="next-episode-button" data-next-episode="${nextEpisode}" aria-label="Next episode">Next Episode</button>`;
}

// Event delegation for buttons, keep it global
document.getElementById('episodeContent').addEventListener('click', (event) => {
    const target = event.target;
    if (target.classList.contains('choice-button')) {
        loadScene(target.getAttribute('data-next-scene'));
    } else if (target.classList.contains('next-button')) {
        loadScene(target.getAttribute('data-next-scene'));
    } else if (target.classList.contains('next-episode-button')) {
        const nextEpisodeIndex = target.getAttribute('data-next-episode');
        loadEpisode(nextEpisodeIndex);
    }
});


        function loadScene(sceneId) {
            const scene = currentEpisode.scenes.find(s => s.id === sceneId); 
            displayScene(currentEpisode, sceneId); 
        }
    </script>
</body>
</html>
