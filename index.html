<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visual Novel Episodes</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 20px;
        }
        h1 {
            text-align: center;
        }
        .episode-list {
            list-style-type: none;
            padding: 0;
        }
        .episode-list li {
            margin: 10px 0;
        }
        .episode-list a {
            text-decoration: none;
            color: #007BFF;
        }
        #episodeContent {
            margin-top: 20px;
            padding: 10px;
            background-color: #fff;
            border: 1px solid #ccc;
        }
        button.choice-button {
    color: darkred;
        }
        button.next-button {
    color: green;
}
    </style>
</head>
<body>
    <h1>Visual Novel Episodes</h1>
    <ul class="episode-list" id="episodeList"></ul>
    <div id="episodeContent"></div>

<script>
    let episodes = [];
    let currentSceneId = null; 
    let currentEpisodeIndex = null; 

    // Load the combined episodes JSON file
    fetch('episodes.json')
        .then(response => {
            if (!response.ok) {
                throw new Error('Network response was not ok');
            }
            return response.json();
        })
        .then(data => {
            episodes = data.episodes;
            displayEpisodeList();
        })
        .catch(error => {
            console.error('There was a problem with the fetch operation:', error);
            document.getElementById('episodeContent').innerText = 'Failed to load episodes. Please try again later.';
        });

    function displayEpisodeList() {
        const episodeList = document.getElementById('episodeList');
        episodeList.innerHTML = episodes.map((episode, index) => 
            `<li><a href="#" data-index="${index}">Episode ${episode.episode}: ${episode.title}</a></li>`
        ).join('');
        episodeList.addEventListener('click', (event) => {
            if (event.target.tagName === 'A') {
                const index = event.target.getAttribute('data-index');
                loadEpisode(index);
            }
        });
    }

    function loadEpisode(index) {
        currentEpisodeIndex = index; 
        const episode = episodes[index];
        currentSceneId = episode.scenes[0].id; 
        displayScene(episode, currentSceneId); 
    }

    function displayScene(episode, sceneId) {
        const episodeContent = document.getElementById('episodeContent');
        const scene = episode.scenes.find(s => s.id === sceneId);
        
        if (scene) {
            let content = `<h2>${episode.title}</h2><p>${scene.text}</p>`;
            
            if (scene.choices && scene.choices.length > 0) {
                content += scene.choices.map(choice => 
                    `<button class="choice-button" data-next-scene="${choice.nextScene}">${choice.text}</button>`
                ).join('');
            } else if (scene.nextScene) {
                content += `<button class="next-button" data-next-scene="${scene.nextScene}">Next</button>`;
            }

            if (scene.nextEpisode) {
                const nextEpisodeIndex = episodes.findIndex(ep => ep.episode === scene.nextEpisode.split('episode')[1]);
                if (nextEpisodeIndex !== -1) {
                    content += `<button class="next-episode-button" data-next-episode="${nextEpisodeIndex}">Next Episode</button>`;
                }
            }

            episodeContent.innerHTML = content;
        }
    }

    // Single event listener for all buttons
    document.getElementById('episodeContent').addEventListener('click', (event) => {
        const target = event.target;
        if (target.classList.contains('choice-button')) {
            loadScene(target.getAttribute('data-next-scene'));
        } else if (target.classList.contains('next-button')) {
            loadScene(target.getAttribute('data-next-scene'));
        } else if (target.classList.contains('next-episode-button')) {
            const nextEpisodeIndex = target.getAttribute('data-next-episode');
            loadEpisode(nextEpisodeIndex);
        }
    });

    function loadScene(sceneId) {
        const episode = episodes[currentEpisodeIndex];
        currentSceneId = sceneId; 
        displayScene(episode, sceneId); 
    }
</script>

</body>
</html>
