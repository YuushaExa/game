<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visual Novel Episodes</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 20px;
        }
        h1 {
            text-align: center;
        }
        .episode-list {
            list-style-type: none;
            padding: 0;
        }
        .episode-list li {
            margin: 10px 0;
        }
        .episode-list a {
            text-decoration: none;
            color: #007BFF;
        }
        #episodeContent {
            margin-top: 20px;
            padding: 10px;
            background-color: #fff;
            border: 1px solid #ccc;
        }
    </style>
</head>
<body>
    <h1>Visual Novel Episodes</h1>
    <ul class="episode-list" id="episodeList"></ul>
    <div id="episodeContent"></div>

    <script>
        let episodes = [];

        // Load the combined episodes JSON file
        fetch('episodes.json')
            .then(response => {
                if (!response.ok) {
                    throw new Error('Network response was not ok');
                }
                return response.json();
            })
            .then(data => {
                episodes = data.episodes;
                displayEpisodeList();
            })
            .catch(error => {
                console.error('There was a problem with the fetch operation:', error);
            });

        function displayEpisodeList() {
            const episodeList = document.getElementById('episodeList');
            episodes.forEach((episode, index) => {
                const listItem = document.createElement('li');
                listItem.innerHTML = `<a href="#" onclick="loadEpisode(${index})">Episode ${episode.episode}: ${episode.title}</a>`;
                episodeList.appendChild(listItem);
            });
        }

        function loadEpisode(index) {
            const episodeContent = document.getElementById('episodeContent');
            const episode = episodes[index];
            episodeContent.innerHTML = `<h2>${episode.title}</h2>`;
            episode.scenes.forEach(scene => {
                episodeContent.innerHTML += `<p>${scene.text}</p>`;
                if (scene.choices.length > 0) {
                    scene.choices.forEach(choice => {
                        episodeContent.innerHTML += `<button onclick="loadScene('${choice.nextScene}')">${choice.text}</button>`;
                    });
                }
            });
        }

        function loadScene(sceneId) {
            // This function can be expanded to load specific scenes if needed
            console.log(`Loading scene: ${sceneId}`);
            // For now, it just logs the scene ID
        }
    </script>
</body>
</html>
