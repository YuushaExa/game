<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visual Novel Episodes</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 20px;
        }
        h1 {
            text-align: center;
        }
        .episode-list {
            list-style-type: none;
            padding: 0;
        }
        .episode-list li {
            margin: 10px 0;
        }
        .episode-list a {
            text-decoration: none;
            color: #007BFF;
        }
        #episodeContent {
            margin-top: 20px;
            padding: 10px;
            background-color: #fff;
            border: 1px solid #ccc;
        }
    </style>
</head>
<body>
    <h1>Visual Novel Episodes</h1>
    <ul class="episode-list" id="episodeList"></ul>
    <div id="episodeContent"></div>

    <script>
        let episodes = [];
        let currentSceneId = null; // To keep track of the current scene
        let currentEpisodeIndex = null; // To keep track of the current episode index

        // Load the combined episodes JSON file
        fetch('episodes.json')
            .then(response => {
                if (!response.ok) {
                    throw new Error('Network response was not ok');
                }
                return response.json();
            })
                       .then(data => {
                episodes = data.episodes;
                displayEpisodeList();
            })
            .catch(error => {
                console.error('There was a problem with the fetch operation:', error);
            });

        function displayEpisodeList() {
            const episodeList = document.getElementById('episodeList');
            episodes.forEach((episode, index) => {
                const listItem = document.createElement('li');
                listItem.innerHTML = `<a href="#" onclick="loadEpisode(${index})">Episode ${episode.episode}: ${episode.title}</a>`;
                episodeList.appendChild(listItem);
            });
        }

        function loadEpisode(index) {
            currentEpisodeIndex = index; // Set the current episode index
            const episodeContent = document.getElementById('episodeContent');
            const episode = episodes[index];
            currentSceneId = episode.scenes[0].id; // Start with the first scene
            displayScene(episode, currentSceneId); // Pass the index to displayScene
        }

        function displayScene(episode, sceneId) {
            const episodeContent = document.getElementById('episodeContent');
            const scene = episode.scenes.find(s => s.id === sceneId);
            
            if (scene) {
                episodeContent.innerHTML = `<h2>${episode.title}</h2><p>${scene.text}</p>`;
                
                // Create buttons based on the JSON structure
                if (scene.choices && scene.choices.length > 0) {
                    scene.choices.forEach(choice => {
                        episodeContent.innerHTML += `<button onclick="loadScene('${choice.nextScene}')">${choice.text}</button>`;
                    });
                } else if (scene.nextScene) {
                    // Show "Next" button only if there is a nextScene
                    episodeContent.innerHTML += `<button onclick="loadScene('${scene.nextScene}')">Next</button>`;
                }

                // Check for nextEpisode property
                if (scene.nextEpisode) {
                    const nextEpisodeIndex = episodes.findIndex(ep => ep.episode === scene.nextEpisode);
                    if (nextEpisodeIndex !== -1) {
                        episodeContent.innerHTML += `<button onclick="loadEpisode(${nextEpisodeIndex})">Next Episode</button>`;
                    }
                } else if (!scene.choices && !scene.nextScene && !scene.nextEpisode) {
                    // If there are no choices, nextScene, or nextEpisode, show a message
                    episodeContent.innerHTML += `<p>No further actions available.</p>`;
                }
            }
        }

        function loadScene(sceneId) {
            const episode = episodes[currentEpisodeIndex];
            currentSceneId = sceneId; // Update the current scene ID
            displayScene(episode, sceneId); // Pass the episodeIndex to displayScene
        }
    </script>
</body>
</html>
