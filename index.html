<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visual Novel Episodes</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 20px;
        }
        h1 {
            text-align: center;
        }
        .episode-list {
            list-style-type: none;
            padding: 0;
        }
        .episode-list li {
            margin: 10px 0;
        }
        .episode-list a {
            text-decoration: none;
            color: #007BFF;
        }
        #episodeContent {
            margin-top: 20px;
            padding: 10px;
            background-color: #fff;
            border: 1px solid #ccc;
        }
        button.choice-button {
    color: darkred;
        }
        button.next-button {
    color: green;
}
    </style>
</head>
<body>
    <h1>Visual Novel Episodes</h1>
    <ul class="episode-list" id="episodeList"></ul>
        <div id="episodeContent"></div> <!-- Added this line -->

    <script>
           let currentSceneId = null; 
        let currentEpisode = null; 

        fetch('episodes.json')
            .then(response => {
                if (!response.ok) {
                    throw new Error('Network response was not ok');
                }
                return response.json();
            })
            .then(data => {
                episodes = data.episodes;
                displayEpisodeList();
            })
            .catch(error => {
                console.error('There was a problem with the fetch operation:', error);
                document.getElementById('episodeContent').innerText = 'Failed to load episodes. Please try again later.';
            });

        function displayEpisodeList() {
            const episodeList = document.getElementById('episodeList');
            episodeList.innerHTML = episodes.map((episode, index) => 
                `<li><a href="#" data-index="${index}">Episode ${episode.episode}: ${episode.title}</a></li>`
            ).join('');
            episodeList.addEventListener('click', (event) => {
                if (event.target.tagName === 'A') {
                    const index = event.target.getAttribute('data-index');
                    loadEpisode(index);
                }
            });
        }

    function loadEpisode(index) {
    currentEpisodeIndex = index; 
    currentEpisode = episodes[index]; // Set currentEpisode here
    currentSceneId = currentEpisode.scenes[0].id; 
    displayScene(currentEpisode.scenes[0]); // Pass the first scene directly
}
function displayScene(scene) {
    const episodeContent = document.getElementById('episodeContent');
    let content = `<h2>${currentEpisode.title}</h2><p>${scene.text}</p>`; // Use currentEpisode here

    if (scene.choices && scene.choices.length > 0) {
        content += scene.choices.map(choice => 
            `<button class="choice-button" data-next-scene="${choice.nextScene}">${choice.text}</button>`
        ).join('');
    } else if (scene.nextScene) {
        content += `<button class="next-button" data-next-scene="${scene.nextScene}">Next</button>`;
    }

    if (scene.nextEpisode) {
        content += `<button class="next-episode-button" data-next-episode="${scene.nextEpisode}">Next Episode</button>`;
    }

    episodeContent.innerHTML = content;
}


     document.getElementById('episodeContent').addEventListener('click', (event) => {
    const target = event.target;
    if (target.classList.contains('choice-button')) {
        const nextSceneId = target.getAttribute('data-next-scene');
        const nextScene = currentEpisode.scenes.find(s => s.id === nextSceneId);
        displayScene(nextScene);
    } else if (target.classList.contains('next-button')) {
        const nextSceneId = target.getAttribute('data-next-scene');
        const nextScene = currentEpisode.scenes.find(s => s.id === nextSceneId);
        displayScene(nextScene);
    } else if (target.classList.contains('next-episode-button')) {
        const nextEpisodeIndex = parseInt(target.getAttribute('data-next-episode'), 10);
        if (nextEpisodeIndex >= 0 && nextEpisodeIndex < episodes.length) {
            loadEpisode(nextEpisodeIndex); // Load the next episode by index
        } else {
            console.error('Next episode index is out of bounds');
        }
    }
});
    </script>
</body>
</html>
